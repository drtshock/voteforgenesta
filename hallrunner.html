function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  C.style.width  = W * s + 'px';
  C.style.height = H * s + 'px';

// ── Perspective ──
const VPX = 200, VPY = 168;
const FLY = 590, CLY = 55;
const NX  = [112, 200, 288];
const PZ  = 0.86;
const PY  = VPY + (FLY - VPY) * PZ;  // ≈527

function wx(lane, z) { return VPX + (NX[lane] - VPX) * z; }
function wy(z)       { return VPY + (FLY - VPY) * z; }

// Far-wall constants (used everywhere)
const FW = 120, FH = 100;
const FL = VPX - FW/2, FR = VPX + FW/2;
const FT = VPY - FH/2, FB = VPY + FH/2;

function fetchLeaderboard() {
  if (!SUPA_URL || SUPA_URL.startsWith('YOUR_')) return;
  lbLoading = true;
  lbError = false;
  fetch(SUPA_URL + '/rest/v1/scores?select=score,created_at&order=score.desc,created_at.desc&limit=10', {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  })
  .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
  .then(function(data) { lbEntries = data; lbLoading = false; })
  .catch(function() { lbError = true; lbLoading = false; });
}

function submitScore(score, zone) {
  if (scoreSubmitted || score <= 0) return;
  if (!SUPA_URL || SUPA_URL.startsWith('YOUR_')) return;
  scoreSubmitted = true;
  fetch(SUPA_URL + '/rest/v1/scores', {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ score: score, zone: zone })
  })
  .then(function() { fetchLeaderboard(); })
  .catch(function() {});
}

function timeAgo(iso) {
  var s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return 'just now';
  var m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  var h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  var d = Math.floor(h / 24);
  if (d === 1) return 'yesterday';
  return d + 'd ago';
}

function drawLeaderboard(playerScore) {
  var y0 = 258;

  // Header
  ctx.font = "bold 11px 'Bebas Neue'";
  ctx.fillStyle = 'rgba(255,184,0,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('\u2500\u2500 TOP RUNNERS \u2500\u2500', W/2, y0);

  if (lbLoading) {
    ctx.font = "11px 'DM Sans'";
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('Loading\u2026', W/2, y0 + 44);
    return;
  }

  if (lbError || !SUPA_URL || SUPA_URL.startsWith('YOUR_')) {
    ctx.font = "11px 'DM Sans'";
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText('Leaderboard unavailable', W/2, y0 + 44);
    return;
  }

  if (lbEntries.length === 0) {
    ctx.font = "11px 'DM Sans'";
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText('No scores yet \u2014 be the first!', W/2, y0 + 44);
    return;
  }

  var top5 = lbEntries.slice(0, 5);
  var matched = false;
  var lineH = 20;

  for (var i = 0; i < top5.length; i++) {
    var entry = top5[i];
    var ey = y0 + 22 + i * lineH;
    var isPlayer = !matched && entry.score === playerScore && playerScore > 0;
    if (isPlayer) matched = true;

    // Highlight row
    if (isPlayer) {
      ctx.fillStyle = 'rgba(255,184,0,0.1)';
      ctx.fillRect(W/2 - 130, ey - 12, 260, lineH);
    }

    // Rank
    ctx.font = "bold 13px 'Bebas Neue'";
    ctx.fillStyle = isPlayer ? COL.gold : 'rgba(255,255,255,0.45)';
    ctx.textAlign = 'right';
    ctx.fillText((i + 1) + '.', W/2 - 100, ey);

    // Score
    ctx.font = "bold 13px 'Bebas Neue'";
    ctx.fillStyle = isPlayer ? COL.white : 'rgba(255,255,255,0.7)';
    ctx.textAlign = 'left';
    ctx.fillText(entry.score.toLocaleString(), W/2 - 90, ey);

    // Time / YOU marker
    ctx.font = "11px 'DM Sans'";
    ctx.textAlign = 'right';
    if (isPlayer) {
      ctx.fillStyle = COL.gold;
      ctx.fillText('\u2190 YOU  ' + timeAgo(entry.created_at), W/2 + 128, ey);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillText(timeAgo(entry.created_at), W/2 + 128, ey);
    }
  }
}

const keys = new Set();

document.addEventListener('keydown', e => { keys.add(e.code); e.preventDefault(); });
document.addEventListener('keyup',   e => keys.delete(e.code));
function justPressed(k) { return keys.has(k) && !prevKeys.has(k); }

let swipe = null, tx0 = 0, ty0 = 0;
C.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; e.preventDefault();
}, { passive: false });

  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;

    swipe = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'R':'L') : (dy < 0 ? 'U':'D');

  e.preventDefault();

// ── Audio ──
let aud;
try { aud = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}

function tone(freq, dur, vol=0.08, type='sine', delay=0) {
  if (!aud) return;
  try {
    if (aud.state === 'suspended') aud.resume();
    const o = aud.createOscillator(), g = aud.createGain();
    o.connect(g); g.connect(aud.destination);
    o.type = type; o.frequency.value = freq;
    const t0 = aud.currentTime + delay;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.start(t0); o.stop(t0 + dur);
  } catch(e) {}
}
function sweep(f0, f1, dur, vol=0.08, type='sine', delay=0) {
  if (!aud) return;
  try {
    if (aud.state === 'suspended') aud.resume();
    const o = aud.createOscillator(), g = aud.createGain();
    o.connect(g); g.connect(aud.destination);
    o.type = type;
    const t0 = aud.currentTime + delay;
    o.frequency.setValueAtTime(f0, t0);
    o.frequency.exponentialRampToValueAtTime(f1, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.start(t0); o.stop(t0 + dur);
  } catch(e) {}
}

const SFX = {

// ── Float text ──
function floatText(x, y, text, col, size=18) {
  G.floatTexts.push({ x, y, text, col, size, life: 1, vy: -1.8 });
}

// ── Particles ──
function spawnParts(x, y, col, n=8, spd=4) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (spd * 0.5) + Math.random() * spd;
    G.parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2, col, life: 1, size: 2 + Math.random() * 4 });
  }
}
function spawnDust(x, y) {
  for (let i = 0; i < 2; i++) {
    G.parts.push({
      x: x + (Math.random()-0.5)*8, y,
      vx: (Math.random()-0.5)*1.5, vy: -Math.random()*1.2,
      col: 'rgba(200,180,255,0.5)', life: 0.7, size: 2 + Math.random()*2,
    });
  }
}

// ── Spawn ──
function spawnObs() {
  const def = ODEFS[Math.floor(Math.random() * ODEFS.length)];
  const lane = Math.floor(Math.random() * 3);
  const tooClose = G.obs.some(o => o.lane === lane && o.z < 0.22);
  if (tooClose) return;
  G.obs.push({ ...def, lane, z: 0.05 });
}

function spawnCoins(lane, chain=1) {
  const def = CDEFS[Math.floor(Math.random() * CDEFS.length)];
  for (let i = 0; i < chain; i++) {
    G.coins.push({ ...def, lane, z: 0.06 + i * 0.09 });
  }
}

// ── Combo logic ──
function addCombo() {
  G.combo++;
  const prev = G.multiplier;
  if      (G.combo >= 10) G.multiplier = 4;
  else if (G.combo >= 6)  G.multiplier = 3;
  else if (G.combo >= 3)  G.multiplier = 2;
  else                    G.multiplier = 1;
  if (G.multiplier > prev) {
    const sfxFn = [null, null, SFX.combo2, SFX.combo3, SFX.combo4][G.multiplier];
    if (sfxFn) sfxFn();
  }
}
function breakCombo() {
  G.combo = 0; G.multiplier = 1;
}

// ── Update ──
function update() {
  const { frame } = G;

  // ── Input ──
  const goLeft  = justPressed('ArrowLeft')  || justPressed('KeyA') || swipe === 'L';
  const goRight = justPressed('ArrowRight') || justPressed('KeyD') || swipe === 'R';
  const goJump  = justPressed('ArrowUp')    || justPressed('KeyW') || justPressed('Space') || swipe === 'U';
  const goSlide = justPressed('ArrowDown')  || justPressed('KeyS') || swipe === 'D';
  swipe = null;

  // ── Lane switch ──
  if (goLeft  && G.tLane > 0) { G.tLane--; G.leanX = -1; SFX.switch(); }
  if (goRight && G.tLane < 2) { G.tLane++; G.leanX =  1; SFX.switch(); }
  G.px   += (NX[G.tLane] - G.px) * 0.2;
  G.leanX *= 0.82; // decay lean

  // ── Jump ──
  if (goJump && !G.jumping && !G.sliding) {
    G.jumping = true; G.jumpT = 0; SFX.jump();
  }
  if (G.jumping) {
    G.jumpT += 0.052;
    G.jumpH  = Math.sin(G.jumpT * Math.PI) * 96;
    if (G.jumpT >= 1) {
      G.jumping = false; G.jumpH = 0;
      G.landSquash = 8;
      SFX.land();
      spawnDust(G.px - 8, PY + 20);
      spawnDust(G.px + 8, PY + 20);
    }
  }
  if (G.landSquash > 0) G.landSquash--;

  // ── Slide ──
  if (goSlide && !G.jumping && !G.sliding) {
    G.sliding = true; G.slideT = 0; SFX.slide();
  }
  if (G.sliding) {
    G.slideT += 0.04;
    if (G.slideT >= 1) { G.sliding = false; G.slideT = 0; }
  }

  // ── Dust while running (not jumping) ──
  if (!G.jumping) {
    G.dustTimer++;
    if (G.dustTimer % 8 === 0) {
      spawnDust(G.px + (Math.random()-0.5)*12, PY + 18);
    }
  }

  // ── Speed ramp ──
  G.speed = Math.min(9.5, 2.4 + frame * 0.00045);
  G.bgScroll += G.speed;
  G.score = Math.floor(frame * 0.15);

  // ── Zone check ──
  for (let i = ZONES.length - 1; i >= 0; i--) {
    if (G.speed >= ZONES[i].speed && G.zone < ZONES[i].zone) {
      G.zone = ZONES[i].zone;
      G.milestoneText = ZONES[i].label;
      G.milestoneT = 120;
      SFX.zone();
      spawnParts(W/2, H/2, COL.gold, 20, 6);
      break;
    }
  }
  if (G.milestoneT > 0) G.milestoneT--;

  // ── Location sign ──
  G.locTimer += G.speed;
  if (G.locTimer > 900) {
    G.locTimer = 0;
    G.locIdx = (G.locIdx + 1) % LOCS.length;
    G.locShow = 110;
  }
  if (G.locShow > 0) G.locShow--;

  // ── Lane danger flash ──
  for (let l = 0; l < 3; l++) {
    const danger = G.obs.some(o => o.lane === l && o.z > 0.5 && o.z < PZ + 0.1);
    G.laneFlash[l] = danger ? Math.min(1, G.laneFlash[l] + 0.08) : Math.max(0, G.laneFlash[l] - 0.07);
  }

  // ── Spawn ──
  G.spawnCD--;
  if (G.spawnCD <= 0) {
    spawnObs();
    const chainLen = Math.random() < 0.3 ? (Math.random() < 0.4 ? 3 : 2) : 1;
    if (Math.random() < 0.5) spawnCoins(Math.floor(Math.random()*3), chainLen);
    G.spawnCD = Math.max(32, 90 - G.speed * 7);
    if (G.speed > 5 && Math.random() < 0.28) {
      setTimeout(() => { if (appState === 'game') spawnObs(); }, 280);
    }
  }

  const zStep = G.speed * 0.003;
  G.invT    = Math.max(0, G.invT - 1);
  G.hitFlash= Math.max(0, G.hitFlash - 1);
  G.shake   = Math.max(0, G.shake - 1);

  // ── Obstacles ──
  for (let i = G.obs.length - 1; i >= 0; i--) {
    const o = G.obs[i];
    o.z += zStep;

    if (o.z >= PZ - 0.05 && o.z <= PZ + 0.09) {
      if (o.lane === G.tLane) {
        let hit = false;
        if      (o.kind === 'block')  hit = true;
        else if (o.kind === 'low')    hit = G.jumpH < 28;
        else if (o.kind === 'high')   hit = !G.sliding;

        if (hit && G.invT === 0) {
          G.lives--;
          G.invT = 95; G.hitFlash = 22; G.shake = 16;
          SFX.hit();
          breakCombo();
          spawnParts(G.px, PY - G.jumpH, COL.red, 14);
          floatText(G.px, PY - 60, 'OUCH!', '#ff5252', 20);
          if (G.lives <= 0) {
            endScore = G.score;
            if (G.score > hiScore) { hiScore = G.score; localStorage.setItem('spc_hi', hiScore); }
            SFX.die();
            submitScore(G.score, G.zone);
            fetchLeaderboard();
            setTimeout(() => { appState = 'over'; }, 700);
          }
        }
      }
    }
    if (o.z > 1.18) G.obs.splice(i, 1);
  }

  // ── Coins ──
  for (let i = G.coins.length - 1; i >= 0; i--) {
    const co = G.coins[i];
    co.z += zStep;
    if (co.z >= PZ - 0.07 && co.z <= PZ + 0.07 && co.lane === G.tLane) {
      const earned = co.pts * G.multiplier;
      G.score += earned;
      addCombo();
      spawnParts(wx(co.lane, co.z), wy(co.z), COL.gold, 6, 3);
      floatText(wx(co.lane, co.z), wy(co.z) - 20,
        `+${earned}${G.multiplier > 1 ? ' x'+G.multiplier+'!' : ''}`,
        G.multiplier > 1 ? COL.goldLt : COL.gold, 14 + G.multiplier * 2);
      SFX.coin();
      G.coins.splice(i, 1);
    } else if (co.z > 1.12) {
      G.coins.splice(i, 1);
    }
  }

  // ── Float texts ──
  for (let i = G.floatTexts.length - 1; i >= 0; i--) {
    const t = G.floatTexts[i];
    t.y  += t.vy; t.vy *= 0.96;
    t.life -= 0.022;
    if (t.life <= 0) G.floatTexts.splice(i, 1);
  }

  // ── Particles ──
  for (let i = G.parts.length - 1; i >= 0; i--) {
    const p = G.parts[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.28; p.life -= 0.035;
    if (p.life <= 0) G.parts.splice(i, 1);
  }

  G.frame++;
}

// ══════════════════════════════════════
//  DRAW
// ══════════════════════════════════════
function draw() {
  ctx.save();
  if (G.shake > 0) {
    ctx.translate((Math.random()-0.5)*G.shake*0.55, (Math.random()-0.5)*G.shake*0.35);
  }

  drawHallway();
  drawLaneDanger();
  drawCoins();
  drawObstacles();
  drawPlayer();
  drawParticles();
  drawFloatTexts();
  drawHUD();

  if (G.hitFlash > 0) {
    ctx.fillStyle = `rgba(220,30,30,${G.hitFlash / 45})`;
    ctx.fillRect(0, 0, W, H);
  }
  if (G.invT > 0 && G.invT % 5 < 2) {
    ctx.fillStyle = 'rgba(255,184,0,0.04)';
    ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();
}

// ── Hallway ──
function drawHallway() {
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);

  // Far wall
  ctx.fillStyle = COL.purpleMd;
  ctx.fillRect(FL, FT, FW, FH);
  const glow = ctx.createRadialGradient(VPX, VPY, 0, VPX, VPY, 140);
  glow.addColorStop(0, 'rgba(107,47,160,0.55)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(VPX-140, VPY-140, 280, 280);

  // Ceiling
  ctx.beginPath();
  ctx.moveTo(-5,CLY); ctx.lineTo(FL,FT); ctx.lineTo(FR,FT); ctx.lineTo(W+5,CLY);
  ctx.closePath();
  const cg = ctx.createLinearGradient(0,CLY,0,VPY);
  cg.addColorStop(0,'#050010'); cg.addColorStop(1,'#1a0535');
  ctx.fillStyle = cg; ctx.fill();

  drawCeilingLights();

  // Floor
  ctx.beginPath();
  ctx.moveTo(-5,FLY); ctx.lineTo(FL,FB); ctx.lineTo(FR,FB); ctx.lineTo(W+5,FLY);
  ctx.closePath();
  const fg = ctx.createLinearGradient(0,VPY,0,FLY);
  fg.addColorStop(0,'#1e0840'); fg.addColorStop(0.6,'#130228'); fg.addColorStop(1,'#0d0118');
  ctx.fillStyle = fg; ctx.fill();

  drawFloorGrid();

  // Lane dividers
  [[FL,    -5   ],[FL+(FR-FL)/3,W/3],[FL+2*(FR-FL)/3,2*W/3],[FR,W+5]].forEach(([fx,nx]) => {
    ctx.beginPath(); ctx.moveTo(fx,FB); ctx.lineTo(nx,FLY);
    ctx.strokeStyle='rgba(255,184,0,0.16)'; ctx.lineWidth=1; ctx.stroke();
  });

  // Left wall
  ctx.beginPath();
  ctx.moveTo(-5,CLY); ctx.lineTo(FL,FT); ctx.lineTo(FL,FB); ctx.lineTo(-5,FLY); ctx.closePath();
  const lw = ctx.createLinearGradient(0,0,FL,0);
  lw.addColorStop(0,'#040010'); lw.addColorStop(1,'#1a0535');
  ctx.fillStyle=lw; ctx.fill();

  // Right wall
  ctx.beginPath();
  ctx.moveTo(W+5,CLY); ctx.lineTo(FR,FT); ctx.lineTo(FR,FB); ctx.lineTo(W+5,FLY); ctx.closePath();
  const rw = ctx.createLinearGradient(FR,0,W,0);
  rw.addColorStop(0,'#1a0535'); rw.addColorStop(1,'#040010');
  ctx.fillStyle=rw; ctx.fill();

  drawWallPanels();

  // Location sign
  if (G.locShow > 0) {
    const a = Math.min(1, G.locShow/18);
    ctx.save(); ctx.globalAlpha = a;
    ctx.fillStyle = COL.gold;
    ctx.fillRect(W/2-132, 106, 264, 32);
    ctx.fillStyle = COL.purpleDk;
    ctx.font = "bold 13px 'Bebas Neue'";
    ctx.textAlign = 'center';
    ctx.fillText('📍 ' + LOCS[G.locIdx], W/2, 128);
    ctx.restore();
  }

  // Zone milestone
  if (G.milestoneT > 0) {
    const a = Math.min(1, G.milestoneT/20) * Math.min(1, G.milestoneT/10);
    const scale = 1 + (1 - Math.min(1, G.milestoneT/30)) * 0.4;
    const zone = ZONES.find(z => z.zone === G.zone) || ZONES[0];
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(W/2, H/2 - 80);
    ctx.scale(scale, scale);
    ctx.font = "bold 28px 'Bebas Neue'";
    ctx.fillStyle = zone.col;
    ctx.textAlign = 'center';
    ctx.fillText(zone.label, 0, 0);
    ctx.restore();
  }
}

function drawCeilingLights() {
  const n = 6;
  for (let i = 0; i < n; i++) {
    const t = ((i/n) + G.bgScroll * 0.0052) % 1;
    if (t < 0.04) continue;
    const lW = (FR-FL) + (W+10-(FR-FL)) * t;
    const lY = FT + (CLY-FT) * (1-t);
    const a  = 0.06 + t * 0.17;
    ctx.fillStyle = `rgba(255,218,100,${a})`;
    ctx.fillRect(W/2 - lW*0.11, lY-2, lW*0.22, 3);
    const coneW = lW * 0.28 * t;
    if (coneW > 2) {
      const flY = VPY + (FLY-VPY)*t;
      const cone = ctx.createRadialGradient(W/2,flY,0, W/2,flY,coneW);
      cone.addColorStop(0, `rgba(255,218,100,${a*0.22})`);
      cone.addColorStop(1, 'rgba(255,218,100,0)');
      ctx.fillStyle = cone;
      ctx.fillRect(W/2-coneW, flY-coneW/2, coneW*2, coneW);
    }
  }
}

function drawFloorGrid() {
  for (let i = 0; i <= 12; i++) {
    const t = ((i/12) + G.bgScroll*0.006) % 1;
    if (t < 0.01) continue;
    const fy = FB + (FLY-FB)*t;
    const bl = (fy-FB)/(FLY-FB);
    const lx = FL + (-5-FL)*bl;
    const rx = FR + (W+5-FR)*bl;
    ctx.strokeStyle = `rgba(107,47,160,${0.05 + bl*0.12})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(lx,fy); ctx.lineTo(rx,fy); ctx.stroke();
  }
}

function drawWallPanels() {
  for (let i = 0; i < 7; i++) {
    const t = ((i/7) + G.bgScroll*0.005) % 1;
    if (t < 0.04 || t > 0.97) continue;
    const lx   = FL + (-5-FL)*t,  rx   = FR + (W+5-FR)*t;
    const topY  = FT + (CLY-FT)*t, botY = FB + (FLY-FB)*t;
    const totH  = botY - topY;
    const pw = 13 + t*27, ph = totH*0.22, py2 = topY + totH*0.14;
    const a = 0.16 + t*0.35;
    const col = `rgba(74,26,117,${a})`, str = `rgba(255,184,0,${a*0.32})`;
    // Left
    ctx.fillStyle=col; ctx.fillRect(lx+3,py2,pw,ph);
    ctx.strokeStyle=str; ctx.lineWidth=0.6; ctx.strokeRect(lx+3,py2,pw,ph);
    ctx.fillStyle=str;   ctx.fillRect(lx+3+pw*0.74,py2+ph*0.44,3,ph*0.12);
    // Right
    ctx.fillStyle=col; ctx.fillRect(rx-pw-3,py2,pw,ph);
    ctx.strokeStyle=str; ctx.strokeRect(rx-pw-3,py2,pw,ph);
    ctx.fillStyle=str;   ctx.fillRect(rx-pw-3+pw*0.2,py2+ph*0.44,3,ph*0.12);
    // Stripe
    const sy = topY + totH*0.64;
    ctx.strokeStyle=`rgba(255,184,0,${a*0.12})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(lx,sy); ctx.lineTo(lx+pw+14,sy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx,sy); ctx.lineTo(rx-pw-14,sy); ctx.stroke();
  }
}

// ── Lane danger flash (floor glow) ──
function drawLaneDanger() {
  const laneNearX = [
    [-5, W/3],
    [W/3, 2*W/3],
    [2*W/3, W+5],
  ];
  for (let l = 0; l < 3; l++) {
    const a = G.laneFlash[l];
    if (a < 0.01) continue;
    const [x0, x1] = laneNearX[l];
    const grad = ctx.createLinearGradient(0, FB, 0, FLY);
    grad.addColorStop(0, `rgba(255,30,30,0)`);
    grad.addColorStop(0.5, `rgba(255,30,30,${a * 0.18})`);
    grad.addColorStop(1, `rgba(255,30,30,${a * 0.08})`);

    // Draw the lane trapezoid
    const fxL = FL + (FR-FL)*[0,1/3,2/3][l];
    const fxR = FL + (FR-FL)*[1/3,2/3,1][l];
    ctx.beginPath();
    ctx.moveTo(fxL, FB); ctx.lineTo(fxR, FB);
    ctx.lineTo(x1, FLY); ctx.lineTo(x0, FLY);
    ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();

    // Pulsing border at bottom of lane
    ctx.strokeStyle = `rgba(255,80,80,${a * 0.5})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x0, FLY-4); ctx.lineTo(x1, FLY-4); ctx.stroke();
  }
}

// ── Obstacles ──
function drawObstacles() {
  const sorted = [...G.obs].sort((a,b) => a.z - b.z);
  for (const o of sorted) {
    const x = wx(o.lane, o.z);
    const s = o.z;
    const bw = o.w * s, bh = o.h * s;

    // High obstacles float above floor; low sit on floor; block are at floor
    let yBase = wy(o.z);
    if (o.kind === 'high') yBase -= bh * 0.55;  // float at chest/head height

    ctx.save();
    ctx.translate(x, yBase);

    // Shadow (only for floor-level obstacles)
    if (o.kind !== 'high') {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath();
      ctx.ellipse(0, bh/2 + 2, bw*0.45, 5*s, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // Glow for high obstacles
    if (o.kind === 'high' && s > 0.3) {
      const hgl = ctx.createRadialGradient(0, 0, 0, 0, 0, bw*0.7);
      hgl.addColorStop(0, 'rgba(255,80,80,0.2)');
      hgl.addColorStop(1, 'rgba(255,80,80,0)');
      ctx.fillStyle = hgl;
      ctx.fillRect(-bw*0.7, -bh, bw*1.4, bh*2);
    }

    // Body
    ctx.fillStyle = o.col;
    if (o.kind === 'low') {
      ctx.fillRect(-bw/2, 0, bw, bh);
    } else {
      ctx.fillRect(-bw/2, -bh/2, bw, bh);
    }

    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    if (o.kind === 'low') {
      ctx.fillRect(-bw/2, 0, bw, 3*s);
    } else {
      ctx.fillRect(-bw/2, -bh/2, bw, 3*s);
    }

    // Outline
    ctx.strokeStyle = `rgba(255,255,255,${o.kind==='high' ? 0.4 : 0.22})`;
    ctx.lineWidth = s * 1.2;
    if (o.kind === 'low') ctx.strokeRect(-bw/2, 0, bw, bh);
    else ctx.strokeRect(-bw/2, -bh/2, bw, bh);

    // Emoji
    if (s > 0.3) {
      const fs = Math.max(9, 17*s);
      ctx.font = `${fs}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const textY = o.kind === 'low' ? bh/2 : 0;
      ctx.fillText(o.emoji, 0, textY - (o.kind==='low'?0: bh*0.15));
      if (s > 0.52) {
        ctx.font = `bold ${Math.max(6,9*s)}px 'Bebas Neue'`;
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillText(o.label, 0, textY + bh*0.28);
      }
    }

    // Low obstacle jump indicator (yellow stripe on top)
    if (o.kind === 'low') {
      ctx.fillStyle = 'rgba(255,184,0,0.4)';
      ctx.fillRect(-bw/2, 0, bw, 4*s);
    }
    // High obstacle slide indicator (red stripe on bottom)
    if (o.kind === 'high') {
      ctx.fillStyle = 'rgba(255,60,60,0.4)';
      ctx.fillRect(-bw/2, bh/2 - 4*s, bw, 4*s);
    }

    ctx.restore();
  }
}

// ── Coins (bobbing) ──
function drawCoins() {
  for (const co of G.coins) {
    const x   = wx(co.lane, co.z);
    const bob = Math.sin(G.frame * 0.12 + co.lane * 2.1) * 5 * co.z;
    const y   = wy(co.z) - 34 * co.z + bob;
    const r   = Math.max(4, 17 * co.z);

    ctx.save();
    ctx.translate(x, y);

    const gl = ctx.createRadialGradient(0,0,0, 0,0,r*2.2);
    gl.addColorStop(0, 'rgba(255,184,0,0.28)');
    gl.addColorStop(1, 'rgba(255,184,0,0)');
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(0,0,r*2.2,0,Math.PI*2); ctx.fill();

    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle = co.col; ctx.fill();
    ctx.strokeStyle = COL.gold; ctx.lineWidth = co.z * 1.8; ctx.stroke();

    if (co.z > 0.28) {
      ctx.font = `${Math.max(7,15*co.z)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(co.emoji, 0, 0);
    }
    ctx.restore();
  }
}

// ── Player ──
function drawPlayer() {
  const x = G.px;
  const jH = G.jumpH;
  const y  = PY - jH;
  const s  = PZ;

  // Squash on land
  const squashY = G.landSquash > 0 ? 1 + (G.landSquash/8)*0.25 : 1;
  const squashX = G.landSquash > 0 ? 1 - (G.landSquash/8)*0.18 : 1;

  // Shadow
  const sAlpha = Math.max(0.08, 0.5 - jH*0.004);
  const sW = 30*s * (1 - jH*0.004) * squashX;
  ctx.fillStyle = `rgba(0,0,0,${sAlpha})`;
  ctx.beginPath(); ctx.ellipse(x, PY+2, sW, 6*s, 0, 0, Math.PI*2); ctx.fill();

  // Invincible flicker
  if (G.invT > 0 && G.invT % 5 < 2) ctx.globalAlpha = 0.35;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(squashX, squashY);

  // Lean during lane switch
  const lean = G.leanX * 0.18; // radians
  ctx.rotate(lean);

  const bw = 22*s, bh = (G.sliding ? 18 : 35)*s;
  const hx = 0, hy = -bh/2 - (G.sliding ? 8 : 14)*s;

  // Backpack
  ctx.fillStyle = '#e65100';
  if (!G.sliding) {
    ctx.fillRect(-bw/2-5*s, -bh/2-5*s, 8*s, bh*0.7);
  } else {
    ctx.fillRect(-bw/2, -bh/2-4*s, bw*0.6, 6*s);
  }

  // Body
  ctx.fillStyle = '#5b25a0';
  ctx.fillRect(-bw/2, -bh/2, bw, bh);
  ctx.fillStyle = '#7c39c4';
  ctx.fillRect(-bw/4, -bh/2, bw/2, bh*(G.sliding?0.6:0.4));

  if (!G.sliding) {
    // Head
    ctx.beginPath(); ctx.arc(hx,hy,12*s,0,Math.PI*2);
    ctx.fillStyle='#f0c27f'; ctx.fill();
    // Hair
    ctx.fillStyle='#2c1a0e';
    ctx.beginPath(); ctx.arc(hx,hy-3*s,12*s,Math.PI,0); ctx.fill();
    ctx.fillRect(hx-12*s,hy-3*s,24*s,6*s);
    // Eyes
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath(); ctx.arc(hx-4*s,hy,2*s,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+4*s,hy,2*s,0,Math.PI*2); ctx.fill();
  } else {
    // Sliding: head peeking forward
    ctx.beginPath(); ctx.arc(bw/2+8*s, -bh/2+2*s, 10*s, 0, Math.PI*2);
    ctx.fillStyle='#f0c27f'; ctx.fill();
    ctx.fillStyle='#2c1a0e';
    ctx.beginPath(); ctx.arc(bw/2+8*s, -bh/2, 10*s, Math.PI, 0); ctx.fill();
    ctx.fillRect(bw/2+8*s-10*s, -bh/2-1*s, 20*s, 4*s);
  }

  // Legs
  const legAnim = (G.jumping||G.sliding) ? 0 : Math.sin(G.frame*0.3)*16;
  ctx.strokeStyle='#3d1e72'; ctx.lineWidth=6*s; ctx.lineCap='round';
  if (!G.sliding) {
    ctx.beginPath(); ctx.moveTo(-5*s,bh/2); ctx.lineTo(-7*s+legAnim*0.3,bh/2+18*s+legAnim*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5*s,bh/2);  ctx.lineTo(7*s-legAnim*0.3,bh/2+18*s-legAnim*0.5); ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-7*s+legAnim*0.3,bh/2+18*s+legAnim*0.5,7*s,3.5*s,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7*s-legAnim*0.3,bh/2+18*s-legAnim*0.5,7*s,3.5*s,0,0,Math.PI*2); ctx.fill();
  } else {
    // Legs extended forward while sliding
    ctx.beginPath(); ctx.moveTo(-bw/2,bh/2); ctx.lineTo(bw+8*s,bh/2+5*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-bw/2,bh/2+4*s); ctx.lineTo(bw+5*s,bh/2+9*s); ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(bw+8*s,bh/2+5*s,7*s,3.5*s,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bw+5*s,bh/2+9*s,7*s,3.5*s,0,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (const p of G.parts) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5,p.size*p.life), 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawFloatTexts() {
  for (const t of G.floatTexts) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, t.life);
    ctx.font = `bold ${t.size}px 'Bebas Neue'`;
    ctx.fillStyle = t.col;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Outline for readability
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 3;
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  }
}

// ── HUD ──
function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,1,24,0.8)';
  ctx.fillRect(0, 0, W, 52);
  ctx.strokeStyle = 'rgba(255,184,0,0.28)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,52); ctx.lineTo(W,52); ctx.stroke();

  // Score
  ctx.font = "bold 12px 'Bebas Neue'";
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE', 16, 18);
  ctx.font = "bold 28px 'Bebas Neue'";
  ctx.fillStyle = COL.white;
  ctx.fillText(G.score, 16, 46);

  // Multiplier badge
  if (G.multiplier > 1) {
    const mx = 88;
    const mcol = ['','','#FFB800','#ff9800','#e040fb'][G.multiplier];
    ctx.fillStyle = mcol;
    ctx.font = "bold 20px 'Bebas Neue'";
    ctx.textAlign = 'left';
    ctx.fillText('x' + G.multiplier + '!', mx, 46);
  }

  // Speed bar
  const spd = Math.min(1,(G.speed-2.4)/7.1);
  const zoneCol = ZONES.slice().reverse().find(z => G.speed >= z.speed)?.col || COL.green;
  ctx.font = "bold 9px 'Bebas Neue'";
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.textAlign = 'center';
  ctx.fillText('SPEED', W/2, 14);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(W/2-42, 18, 84, 5);
  ctx.fillStyle = zoneCol;
  ctx.fillRect(W/2-42, 18, 84*spd, 5);

  // Combo
  if (G.combo > 0) {
    ctx.font = "bold 9px 'Bebas Neue'";
    ctx.fillStyle = 'rgba(255,184,0,0.65)';
    ctx.textAlign = 'center';
    ctx.fillText(`${G.combo} COMBO`, W/2, 35);
  }

  // Best
  ctx.font = "bold 11px 'Bebas Neue'";
  ctx.fillStyle = 'rgba(255,184,0,0.55)';
  ctx.textAlign = 'right';
  ctx.fillText('BEST  ' + hiScore, W-16, 18);

  // Lives
  for (let i = 0; i < 3; i++) {
    ctx.font = '15px serif';
    ctx.textAlign = 'right';
    ctx.globalAlpha = i < G.lives ? 1 : 0.18;
    ctx.fillText('❤️', W-16-i*22, 46);
  }
  ctx.globalAlpha = 1;

  // Bottom hint
  ctx.font = "10px 'DM Sans'";
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.textAlign = 'center';
  ctx.fillText('← → LANES  ·  ↑ JUMP  ·  ↓ SLIDE', W/2, H-10);
}

// ══════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════
let titleFrame = 0;
function drawTitle() {
  titleFrame++;
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0118'); bg.addColorStop(0.5,'#1a0535'); bg.addColorStop(1,'#0a0118');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // Animated hallway silhouette
  ctx.fillStyle = 'rgba(107,47,160,0.12)';
  ctx.beginPath();
  ctx.moveTo(W/2-65,H*0.22); ctx.lineTo(W/2+65,H*0.22);
  ctx.lineTo(W,H*0.72); ctx.lineTo(0,H*0.72); ctx.closePath(); ctx.fill();

  // Scrolling gold lines
  for (let i = 0; i < 4; i++) {
    const yBase = H*(0.25+i*0.13);
    const offset = (titleFrame*0.6 + i*40) % H;
    ctx.strokeStyle = `rgba(255,184,0,${0.04+i*0.02})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, (yBase+offset)%H); ctx.lineTo(W,(yBase+offset)%H); ctx.stroke();
  }

  // Badge
  ctx.fillStyle = COL.purpleDk;
  ctx.fillRect(W/2-145,65,290,120);
  ctx.fillStyle = COL.gold;
  ctx.fillRect(W/2-145,65,290,6);
  ctx.fillRect(W/2-145,179,290,6);

  ctx.font = "bold 18px 'Bebas Neue'";
  ctx.fillStyle = 'rgba(255,184,0,0.8)';
  ctx.textAlign='center';
  ctx.fillText('SAINT PAUL COLLEGE', W/2, 95);

  ctx.font = "bold 70px 'Bebas Neue'";
  ctx.fillStyle = COL.gold;
  ctx.fillText('HALL', W/2+2, 162);
  ctx.fillStyle = COL.white;
  ctx.fillText('HALL', W/2, 160);

  ctx.font = "bold 70px 'Bebas Neue'";
  ctx.fillStyle = COL.gold;
  ctx.fillText('RUNNER', W/2+2, 232);
  ctx.fillStyle = COL.white;
  ctx.fillText('RUNNER', W/2, 230);

  // Animated runner
  const bounce = Math.sin(titleFrame*0.12)*6;
  ctx.font = '50px serif';
  ctx.textAlign='center';
  ctx.fillText('🏃', W/2, 300+bounce);

  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.font = "15px 'DM Sans'";
  ctx.fillText('Run through the hallways of SPC!', W/2, 348);

  ctx.fillStyle = 'rgba(255,255,255,0.48)';
  ctx.font = "12px 'DM Sans'";
  ctx.fillText('← → switch lanes  ·  ↑ jump over low obstacles', W/2, 372);
  ctx.fillText('↓ slide under banners  ·  swipe on mobile', W/2, 390);

  if (hiScore > 0) {
    ctx.fillStyle = 'rgba(255,184,0,0.7)';
    ctx.font = "14px 'Bebas Neue'";
    ctx.fillText(`🏆 BEST: ${hiScore}`, W/2, 416);
  }

  // Blink start button
  const blink = Math.floor(Date.now()/480)%2===0;
  ctx.fillStyle = blink ? COL.gold : COL.goldLt;
  ctx.fillRect(W/2-125,440,250,58);
  ctx.fillStyle = COL.purpleDk;
  ctx.font = "bold 30px 'Bebas Neue'";
  ctx.textAlign='center';
  ctx.fillText('TAP TO START', W/2, 478);

  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font="11px 'DM Sans'";
  ctx.fillText('Dodge 🛒🔒🖥️  ·  Jump 🎒⚠️🪑  ·  Slide 🚧🚪🪧  ·  Collect ☕📖⭐', W/2, 524);

  ctx.fillStyle='rgba(255,184,0,0.55)';
  ctx.font="13px 'Bebas Neue'";
  ctx.fillText('\u2190 VOTEFORGENESTA.COM', W/2, H-32);
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font="10px 'Bebas Neue'";
  ctx.fillText('A CAMPAIGN MINI-GAME · GENESTA CORDERO FOR STUDENT SENATE PRESIDENT', W/2, H-16);
}

function drawGameOver() {
  ctx.fillStyle='rgba(10,1,24,0.92)';
  ctx.fillRect(0,0,W,H);

  // Panel
  ctx.fillStyle=COL.purpleDk;
  ctx.fillRect(W/2-158,60,316,462);
  ctx.fillStyle=COL.gold;
  ctx.fillRect(W/2-158,60,316,6);
  ctx.fillRect(W/2-158,516,316,6);

  // BUSTED!
  ctx.font="bold 46px 'Bebas Neue'";
  ctx.fillStyle=COL.red;
  ctx.textAlign='center';
  ctx.fillText('BUSTED!', W/2, 118);

  ctx.font="bold 14px 'Bebas Neue'";
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillText('YOU HIT AN OBSTACLE', W/2, 140);

  // Score
  ctx.font="11px 'DM Sans'";
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fillText('YOUR SCORE', W/2, 168);
  ctx.font="bold 50px 'Bebas Neue'";
  ctx.fillStyle=COL.white;
  ctx.fillText(endScore.toLocaleString(), W/2, 210);

  const isNew = endScore >= hiScore && endScore > 0;
  ctx.font="bold 14px 'Bebas Neue'";
  ctx.fillStyle=COL.gold;
  ctx.fillText(isNew ? '🏆 NEW PERSONAL BEST!' : 'BEST: ' + hiScore.toLocaleString(), W/2, 236);

  // Leaderboard
  drawLeaderboard(endScore);

  // Play Again button
  const blink = Math.floor(Date.now()/480)%2===0;
  ctx.fillStyle=blink?COL.gold:COL.goldLt;
  ctx.fillRect(W/2-105,384,210,48);
  ctx.fillStyle=COL.purpleDk;
  ctx.font="bold 24px 'Bebas Neue'";
  ctx.textAlign='center';
  ctx.fillText('PLAY AGAIN', W/2, 416);

  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.font="11px 'DM Sans'";
  ctx.fillText('Tap or press Enter to restart', W/2, 448);

  // Tip
  const tips = [
    '\u2193 SLIDE under banners and door signs!',
    '\u2191 JUMP over backpacks, chairs, and books!',
    '\u2190 \u2192 Switch lanes to dodge big obstacles!',
    '\u2615 Grab coffee for +50 pts \u2014 best collect!',
    'Build a combo to multiply your points!',
    '3 collects = x2 \u00b7 6 = x3 \u00b7 10 = x4!',
    'Speed increases over time \u2014 stay sharp!',
    'Red floor glow = obstacle coming in your lane!',
  ];
  ctx.fillStyle='rgba(255,184,0,0.5)';
  ctx.font="12px 'DM Sans'";
  ctx.fillText(tips[Math.floor(Date.now()/4000) % tips.length], W/2, 490);

  // Footer
  ctx.fillStyle='rgba(255,184,0,0.55)';
  ctx.font="13px 'Bebas Neue'";
  ctx.fillText('\u2190 VOTEFORGENESTA.COM', W/2, H-32);
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.font="10px 'Bebas Neue'";
  ctx.fillText('VOTE GENESTA CORDERO \u00b7 MARCH 9\u201313 \u00b7 VOTEFORGENESTA.COM', W/2, H-16);
}

// ══════════════════════════════════════
//  LOOP
// ══════════════════════════════════════
let lastT = 0;
function loop(t) {
  requestAnimationFrame(loop);
  if (t - lastT < 14) return;
  lastT = t;

  if (appState === 'title') {
    drawTitle();
    if (swipe === 'tap' || justPressed('Enter') || justPressed('Space') || justPressed('ArrowUp')) {
      swipe = null; SFX.start(); newGame();
    }
    swipe = null; prevKeys = new Set(keys);
    return;
  }

  if (appState === 'over') {
    drawGameOver();
    if (swipe === 'tap' || justPressed('Enter') || justPressed('Space')) {
      swipe = null; SFX.start(); newGame();
    }
    swipe = null; prevKeys = new Set(keys);
    return;
  }

  update();
  draw();
  prevKeys = new Set(keys);
}

requestAnimationFrame(loop);
</script>

</html>
